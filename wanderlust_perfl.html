<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust - Protótipo Interativo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para Ícones Profissionais -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX no browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Tipografia e Scrollbar */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Animações suaves */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen m-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Cores da Identidade Visual Oficial
        const COLORS = {
            primary: '#008770',
            primaryHover: '#006B59',
            secondary: '#1A2232',
            background: '#F8FAFC',
            white: '#FFFFFF',
            textMain: '#1F2937',
            textLight: '#64748B',
            accent: '#22C55E'
        };

        const WanderlustApp = () => {
            const [currentScreen, setCurrentScreen] = useState('splash');
            const [userProfile, setUserProfile] = useState(null);

            // --- COMPONENTES GLOBAIS ---
            const PhoneFrame = ({ children }) => (
                <div 
                    className="relative overflow-hidden bg-white shadow-2xl flex flex-col"
                    style={{ width: '375px', height: '812px', borderRadius: '45px', border: '12px solid #0F172A' }}
                >
                    {/* Notch do iPhone simulado */}
                    <div className="absolute top-0 left-1/2 transform -translate-x-1/2 w-36 h-7 bg-[#0F172A] rounded-b-3xl z-50"></div>
                    <div className="flex-1 flex flex-col w-full h-full overflow-hidden bg-[#F8FAFC]">
                        {children}
                    </div>
                </div>
            );

            const BottomNav = ({ isPartner }) => (
                <div className="flex justify-around items-center h-20 bg-white border-t border-gray-100 shrink-0 pb-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40">
                    {isPartner ? (
                        <>
                            <button onClick={() => setCurrentScreen('partnerDashboard')} className={`flex flex-col items-center gap-1 ${currentScreen === 'partnerDashboard' ? 'text-[#008770]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-chart-pie text-xl"></i>
                                <span className="text-[10px] font-semibold">Métricas</span>
                            </button>
                            <button onClick={() => setCurrentScreen('partnerManage')} className={`flex flex-col items-center gap-1 ${currentScreen === 'partnerManage' ? 'text-[#008770]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-store text-xl"></i>
                                <span className="text-[10px] font-semibold">Meu Local</span>
                            </button>
                            <button className="flex flex-col items-center gap-1 text-gray-400">
                                <i className="fa-solid fa-user text-xl"></i>
                                <span className="text-[10px] font-semibold">Conta</span>
                            </button>
                        </>
                    ) : (
                        <>
                            <button onClick={() => setCurrentScreen('travelerFeed')} className={`flex flex-col items-center gap-1 ${currentScreen === 'travelerFeed' ? 'text-[#008770]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-house text-xl"></i>
                                <span className="text-[10px] font-semibold">Início</span>
                            </button>
                            <button onClick={() => setCurrentScreen('planBasic')} className={`flex flex-col items-center gap-1 ${['planBasic', 'planPrefs', 'chatAI'].includes(currentScreen) ? 'text-[#008770]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-wand-magic-sparkles text-xl"></i>
                                <span className="text-[10px] font-semibold">Planejar</span>
                            </button>
                            <button onClick={() => setCurrentScreen('search')} className={`flex flex-col items-center gap-1 ${currentScreen === 'search' ? 'text-[#008770]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-magnifying-glass text-xl"></i>
                                <span className="text-[10px] font-semibold">Buscar</span>
                            </button>
                            <button onClick={() => setCurrentScreen('profile')} className={`flex flex-col items-center gap-1 ${currentScreen === 'profile' ? 'text-[#008770]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-user text-xl"></i>
                                <span className="text-[10px] font-semibold">Perfil</span>
                            </button>
                        </>
                    )}
                </div>
            );

            const Header = ({ title, showBack = true, onBack, subtitle }) => (
                <div className="flex flex-col px-6 pt-14 pb-4 bg-white z-40 relative shadow-sm shrink-0">
                    <div className="flex items-center">
                        {showBack && (
                            <button onClick={onBack} className="w-8 h-8 flex items-center justify-center mr-2 text-[#008770] rounded-full bg-teal-50">
                                <i className="fa-solid fa-chevron-left text-sm"></i>
                            </button>
                        )}
                        <div>
                            <h1 className="text-lg font-bold text-[#1A2232]">{title}</h1>
                            {subtitle && <p className="text-xs text-gray-500 font-medium">{subtitle}</p>}
                        </div>
                    </div>
                </div>
            );

            // --- TELAS ---

            // Tela 1: Splash
            const ScreenSplash = () => (
                <div 
                    className="flex-1 flex flex-col items-center justify-center cursor-pointer fade-in"
                    style={{ backgroundColor: COLORS.primary }}
                    onClick={() => setCurrentScreen('profileSelect')}
                >
                    <div className="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mb-6 shadow-lg">
                        <i className="fa-solid fa-route text-4xl text-[#008770]"></i>
                    </div>
                    <h1 className="text-4xl font-bold text-white tracking-wide mb-2">Wanderlust</h1>
                    <p className="text-white text-sm opacity-90 font-medium mb-12">Seu roteiro mágico começa aqui</p>
                    
                    <div className="absolute bottom-12 flex flex-col items-center">
                        <i className="fa-solid fa-circle-notch fa-spin text-white text-2xl opacity-80 mb-4"></i>
                        <p className="text-white text-xs opacity-70 font-medium">Toque na tela para iniciar</p>
                    </div>
                </div>
            );

            // Tela 2: Seleção de Perfil
            const ScreenProfileSelect = () => (
                <div className="flex-1 flex flex-col p-6 pt-24 bg-[#F8FAFC] fade-in overflow-hidden">
                    <h2 className="text-3xl font-bold text-[#1A2232] mb-2">Boas-vindas!</h2>
                    <p className="text-gray-500 text-sm mb-10 font-medium">Como você quer usar o Wanderlust hoje?</p>

                    <button 
                        onClick={() => { setUserProfile('traveler'); setCurrentScreen('travelerFeed'); }}
                        className="flex items-center p-6 rounded-3xl mb-5 transition-transform active:scale-95 shadow-md relative overflow-hidden"
                        style={{ backgroundColor: COLORS.primary }}
                    >
                        <div className="absolute -right-4 -top-4 opacity-10">
                            <i className="fa-solid fa-plane text-8xl"></i>
                        </div>
                        <div className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mr-5 backdrop-blur-sm">
                            <i className="fa-solid fa-plane text-2xl text-white"></i>
                        </div>
                        <div className="text-left text-white z-10">
                            <div className="font-bold text-xl mb-1">Sou Viajante</div>
                            <div className="text-xs opacity-90 font-medium leading-relaxed">Quero planejar e viver <br/>minha próxima viagem.</div>
                        </div>
                    </button>

                    <button 
                        onClick={() => { setUserProfile('partner'); setCurrentScreen('partnerDashboard'); }}
                        className="flex items-center p-6 rounded-3xl transition-transform active:scale-95 shadow-md relative overflow-hidden"
                        style={{ backgroundColor: COLORS.secondary }}
                    >
                        <div className="absolute -right-4 -top-4 opacity-5">
                            <i className="fa-solid fa-shop text-8xl"></i>
                        </div>
                        <div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center mr-5 backdrop-blur-sm border border-white/10">
                            <i className="fa-solid fa-store text-2xl text-white"></i>
                        </div>
                        <div className="text-left text-white z-10">
                            <div className="font-bold text-xl mb-1">Sou Parceiro</div>
                            <div className="text-xs opacity-90 font-medium leading-relaxed">Quero gerenciar meu local <br/>e analisar métricas.</div>
                        </div>
                    </button>
                </div>
            );

            // Tela 3: Feed do Viajante
            const ScreenTravelerFeed = () => (
                <div className="flex-1 flex flex-col bg-[#F8FAFC] fade-in overflow-hidden">
                    <div className="px-6 pt-16 pb-8 bg-[#1A2232] rounded-b-[40px] shadow-lg z-10 shrink-0">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-white">Olá, Fulano!</h2>
                                <p className="text-gray-300 text-sm mt-1">Pronto para a aventura?</p>
                            </div>
                            <div onClick={() => setCurrentScreen('profile')} className="w-12 h-12 bg-gradient-to-br from-[#008770] to-[#005c4c] rounded-full flex items-center justify-center border-2 border-white cursor-pointer shadow-md">
                                <span className="text-white font-bold text-lg">F</span>
                            </div>
                        </div>
                        
                        {/* Card Principal CTA */}
                        <div className="bg-white p-5 rounded-3xl shadow-md">
                            <div className="flex justify-between items-start mb-4">
                                <div>
                                    <h3 className="font-bold text-[#1A2232] text-base">Nova Viagem</h3>
                                    <p className="text-xs text-gray-500 font-medium mt-1">IA monta o roteiro ideal</p>
                                </div>
                                <div className="w-10 h-10 bg-teal-50 rounded-full flex items-center justify-center">
                                    <i className="fa-solid fa-wand-magic-sparkles text-[#008770]"></i>
                                </div>
                            </div>
                            <button 
                                onClick={() => setCurrentScreen('planBasic')}
                                className="w-full py-3.5 rounded-2xl text-white font-semibold text-sm flex justify-center items-center gap-2 transition-transform active:scale-95 shadow-sm"
                                style={{ backgroundColor: COLORS.primary }}
                            >
                                Iniciar Planejamento
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6">
                        <div className="flex justify-between items-end mb-4">
                            <h3 className="font-bold text-[#1A2232] text-lg">Suas Viagens</h3>
                            <span className="text-[#008770] text-xs font-bold">Ver todas</span>
                        </div>
                        
                        {/* Item de Viagem */}
                        <div 
                            onClick={() => setCurrentScreen('itinerary')}
                            className="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-4 cursor-pointer transition-transform active:scale-95"
                        >
                            <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-bold bg-gradient-to-br from-[#008770] to-[#005c4c]">
                                RJ
                            </div>
                            <div className="flex-1">
                                <h4 className="font-bold text-[#1A2232] text-sm">Verão no Rio</h4>
                                <div className="flex items-center gap-1 mt-1 text-xs text-gray-500 font-medium">
                                    <i className="fa-regular fa-calendar text-[10px]"></i>
                                    <span>15 Dez - 22 Dez</span>
                                </div>
                            </div>
                            <div className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400">
                                <i className="fa-solid fa-chevron-right text-xs"></i>
                            </div>
                        </div>
                    </div>
                    <BottomNav isPartner={false} />
                </div>
            );

            // Tela Nova: Busca/Descobrir Roteiros
            const ScreenSearch = () => (
                <div className="flex-1 flex flex-col bg-[#F8FAFC] fade-in overflow-hidden">
                    <Header title="Descobrir" subtitle="Explore roteiros montados pela comunidade" showBack={false} />
                    
                    <div className="flex-1 overflow-y-auto p-6">
                        {/* Barra de Pesquisa */}
                        <div className="relative mb-8">
                            <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input 
                                type="text" 
                                placeholder="Buscar destinos, estilos..." 
                                className="w-full pl-11 pr-4 py-3.5 bg-white shadow-sm border border-gray-100 rounded-2xl text-sm font-medium focus:outline-none focus:border-[#008770] transition-all"
                            />
                        </div>

                        <h3 className="font-bold text-[#1A2232] text-lg mb-4">Roteiros em Destaque</h3>

                        <div className="space-y-5">
                            {/* Card Roteiro 1 */}
                            <div className="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 cursor-pointer transition-transform active:scale-95">
                                <div className="h-32 w-full relative bg-gradient-to-br from-indigo-500 to-purple-600">
                                    <div className="absolute inset-0 bg-black/20"></div>
                                    <div className="absolute top-3 right-3 bg-white/20 backdrop-blur-md px-2 py-1 rounded-lg flex items-center gap-1 text-white text-xs font-bold">
                                        <i className="fa-solid fa-star text-yellow-400 text-[10px]"></i> 4.9
                                    </div>
                                    <div className="absolute bottom-3 left-4">
                                        <span className="bg-white text-indigo-600 text-[10px] font-bold px-2 py-1 rounded-md mb-1 inline-block">5 DIAS</span>
                                        <h4 className="font-bold text-white text-lg leading-tight">Inverno em Gramado</h4>
                                    </div>
                                </div>
                                <div className="p-4">
                                    <div className="flex flex-wrap gap-2">
                                        <span className="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md"><i className="fa-solid fa-utensils"></i> Gastronomia</span>
                                        <span className="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md"><i className="fa-solid fa-wine-glass"></i> Vinhos</span>
                                        <span className="text-[10px] font-bold text-[#008770] bg-teal-50 border border-teal-100 px-2 py-1 rounded-md"><i className="fa-solid fa-wand-magic-sparkles"></i> Gerado por IA</span>
                                    </div>
                                </div>
                            </div>

                            {/* Card Roteiro 2 */}
                            <div className="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 cursor-pointer transition-transform active:scale-95">
                                <div className="h-32 w-full relative bg-gradient-to-br from-teal-500 to-[#008770]">
                                    <div className="absolute inset-0 bg-black/20"></div>
                                    <div className="absolute top-3 right-3 bg-white/20 backdrop-blur-md px-2 py-1 rounded-lg flex items-center gap-1 text-white text-xs font-bold">
                                        <i className="fa-solid fa-star text-yellow-400 text-[10px]"></i> 4.8
                                    </div>
                                    <div className="absolute bottom-3 left-4">
                                        <span className="bg-white text-[#008770] text-[10px] font-bold px-2 py-1 rounded-md mb-1 inline-block">4 DIAS</span>
                                        <h4 className="font-bold text-white text-lg leading-tight">Aventura em Bonito</h4>
                                    </div>
                                </div>
                                <div className="p-4">
                                    <div className="flex flex-wrap gap-2">
                                        <span className="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md"><i className="fa-solid fa-person-hiking"></i> Ecoturismo</span>
                                        <span className="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md"><i className="fa-solid fa-water"></i> Natureza</span>
                                        <span className="text-[10px] font-bold text-[#008770] bg-teal-50 border border-teal-100 px-2 py-1 rounded-md"><i className="fa-solid fa-wand-magic-sparkles"></i> Gerado por IA</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <BottomNav isPartner={false} />
                </div>
            );

            // Tela Nova: Perfil do Usuário
            const ScreenProfile = () => {
                const [ritmo, setRitmo] = useState('moderado');
                const [interesses, setInteresses] = useState(['gastronomia', 'praia']);

                const toggleInteresse = (item) => {
                    if (interesses.includes(item)) {
                        setInteresses(interesses.filter(i => i !== item));
                    } else {
                        setInteresses([...interesses, item]);
                    }
                };

                const chips = [
                    { id: 'gastronomia', label: 'Gastronomia', icon: 'fa-utensils' },
                    { id: 'praia', label: 'Praias', icon: 'fa-umbrella-beach' },
                    { id: 'cultura', label: 'Cultura', icon: 'fa-landmark' },
                    { id: 'aventura', label: 'Aventura', icon: 'fa-person-hiking' },
                    { id: 'compras', label: 'Compras', icon: 'fa-bag-shopping' },
                    { id: 'noite', label: 'Vida Noturna', icon: 'fa-martini-glass' }
                ];

                return (
                    <div className="flex-1 flex flex-col bg-white fade-in overflow-hidden">
                        <Header title="Meu Perfil" subtitle="Gerencie seus dados e preferências" showBack={false} />
                        
                        <div className="flex-1 overflow-y-auto p-6">
                            {/* Avatar e Infos Básicas */}
                            <div className="flex flex-col items-center mb-8">
                                <div className="relative mb-4">
                                    <div className="w-24 h-24 bg-gradient-to-br from-[#008770] to-[#005c4c] rounded-full flex items-center justify-center border-4 border-white shadow-md">
                                        <span className="text-white font-bold text-4xl">F</span>
                                    </div>
                                    <button className="absolute bottom-0 right-0 w-8 h-8 bg-[#1A2232] text-white rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                                        <i className="fa-solid fa-pen text-xs"></i>
                                    </button>
                                </div>
                                <h2 className="text-xl font-bold text-[#1A2232]">Fulano</h2>
                                <p className="text-sm text-gray-500">Viajante Frequente</p>
                            </div>

                            {/* Formulário Dados */}
                            <div className="space-y-4 mb-8">
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wide">Nome Completo</label>
                                    <input type="text" defaultValue="Fulano" className="w-full px-4 py-3.5 bg-[#F8FAFC] border border-gray-200 rounded-2xl text-sm font-bold text-[#1A2232] focus:border-[#008770] focus:outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wide">E-mail</label>
                                    <input type="email" defaultValue="fulano@email.com" className="w-full px-4 py-3.5 bg-[#F8FAFC] border border-gray-200 rounded-2xl text-sm font-medium text-[#1A2232] focus:border-[#008770] focus:outline-none" />
                                </div>
                            </div>

                            <hr className="border-gray-100 mb-8" />

                            {/* Preferências Globais */}
                            <div className="mb-4">
                                <h3 className="font-bold text-[#1A2232] text-lg mb-1">Preferências de Viagem</h3>
                                <p className="text-xs text-gray-500 mb-6">A IA usará esses dados por padrão nos seus roteiros.</p>

                                <label className="block text-sm font-bold text-[#1A2232] mb-3">Seu ritmo ideal:</label>
                                <div className="flex bg-[#F8FAFC] p-1.5 rounded-2xl border border-gray-100 mb-6">
                                    {['Relaxado', 'Moderado', 'Intenso'].map((r) => {
                                        const isSelected = r.toLowerCase() === ritmo;
                                        return (
                                            <button
                                                key={r}
                                                onClick={() => setRitmo(r.toLowerCase())}
                                                className={`flex-1 py-3 text-xs font-bold rounded-xl transition-all ${isSelected ? 'bg-white shadow-sm text-[#008770]' : 'text-gray-400'}`}
                                            >
                                                {r}
                                            </button>
                                        )
                                    })}
                                </div>

                                <label className="block text-sm font-bold text-[#1A2232] mb-3">Interesses Favoritos:</label>
                                <div className="flex flex-wrap gap-2.5 mb-6">
                                    {chips.map(chip => {
                                        const isSelected = interesses.includes(chip.id);
                                        return (
                                            <button
                                                key={chip.id}
                                                onClick={() => toggleInteresse(chip.id)}
                                                className={`px-4 py-2.5 rounded-2xl text-xs font-bold transition-all flex items-center gap-2 border ${
                                                    isSelected 
                                                        ? 'bg-teal-50 text-[#008770] border-[#008770]' 
                                                        : 'bg-white text-gray-500 border-gray-200'
                                                }`}
                                            >
                                                <i className={`fa-solid ${chip.icon}`}></i> {chip.label}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>

                        <div className="p-6 border-t border-gray-50 bg-white shrink-0 z-10">
                            <button className="w-full py-4 rounded-2xl text-white font-bold text-sm flex justify-center items-center gap-2 shadow-md transition-transform active:scale-95" style={{ backgroundColor: COLORS.primary }}>
                                Salvar Perfil
                            </button>
                        </div>
                        <BottomNav isPartner={false} />
                    </div>
                );
            };

            // Tela 4: Detalhes do Roteiro
            const ScreenItinerary = () => (
                <div className="flex-1 flex flex-col bg-white fade-in overflow-hidden">
                    <Header title="Verão no Rio" subtitle="15 a 22 de Dezembro" onBack={() => setCurrentScreen('travelerFeed')} />
                    
                    {/* Imagem Simulada Transformada em Fundo Colorido */}
                    <div className="w-full h-44 relative overflow-hidden bg-gradient-to-br from-[#008770] to-[#1A2232] shrink-0">
                        <div className="absolute inset-0 bg-black/20"></div>
                        <div className="absolute bottom-4 left-6 right-6 flex justify-between items-end">
                            <div>
                                <span className="bg-white text-[#008770] text-[10px] font-bold px-2 py-1 rounded-md mb-2 inline-block">7 DIAS</span>
                                <div className="font-bold text-white text-xl">Rio de Janeiro</div>
                            </div>
                            <div className="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white shadow-sm">
                                <i className="fa-solid fa-share-nodes"></i>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 pb-24">
                        {/* Dia 1 */}
                        <div className="mb-8">
                            <h3 className="font-bold text-base mb-5 flex items-center gap-2" style={{ color: COLORS.secondary }}>
                                <div className="w-8 h-8 rounded-full bg-teal-50 flex items-center justify-center text-[#008770] text-sm">1</div>
                                Chegada e Praia
                            </h3>
                            
                            <div className="pl-5 border-l-[3px] border-gray-100 relative mb-6 ml-4">
                                <div className="absolute w-4 h-4 bg-white border-[3px] border-gray-300 rounded-full -left-[10px] top-0"></div>
                                <div className="text-xs font-bold text-[#008770] mb-1">14:00</div>
                                <div className="text-sm font-bold text-[#1A2232]">Check-in no Hotel</div>
                                <div className="text-xs text-gray-500 font-medium mt-1 flex items-center gap-1">
                                    <i className="fa-solid fa-bed text-[10px]"></i> Copacabana Palace
                                </div>
                            </div>

                    { id: 'cultura', label: 'Cultura', icon: 'fa-landmark' },
                    { id: 'aventura', label: 'Aventura', icon: 'fa-person-hiking' },

                                        return (
                                            <button
                                                key={r}
                                                onClick={() => setRitmo(r.toLowerCase())}

                                                onClick={() => toggleInteresse(chip.id)}

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
